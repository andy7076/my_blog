<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}yyfollower{% endblock %}</title>
    <style>
        :root {
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --black: #0a0a0a;
            --accent: #111111;
            --accent-hover: #333333;
            --link: #2563eb;
            --link-hover: #1d4ed8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.04), 0 4px 6px rgba(0, 0, 0, 0.03);
            --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.7;
            color: var(--gray-800);
            background-color: var(--white);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        a {
            color: var(--link);
            text-decoration: none;
            transition: color var(--transition);
        }

        a:hover {
            color: var(--link-hover);
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* ===== Header ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--gray-200);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .site-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--black);
        }

        .site-title a {
            color: inherit;
            text-decoration: none;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-tab-btn {
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-400);
            background: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            white-space: nowrap;
            font-family: inherit;
            line-height: 1.4;
        }

        .header-tab-btn:hover {
            color: var(--gray-700);
            background: var(--gray-100);
        }

        .header-tab-btn.active {
            color: var(--gray-900);
            background: var(--gray-100);
        }

        /* Mobile: scrollable tabs */
        @media (max-width: 768px) {
            nav {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                -ms-overflow-style: none;
                gap: 2px;
            }
            nav::-webkit-scrollbar {
                display: none;
            }
            .header-tab-btn {
                flex-shrink: 0;
                padding: 8px 12px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .header-tab-btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }

        /* Tab content animations */
        .tab-content {
            display: none;
            animation: tabFadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes tabFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== Main Content ===== */
        main {
            min-height: calc(100vh - 280px);
            padding: 64px 0;
        }

        /* ===== Footer ===== */
        footer {
            border-top: 1px solid var(--gray-200);
            padding: 40px 0 32px;
            margin-top: 80px;
            background: var(--white);
        }

        .footer-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-links {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-link {
            color: var(--gray-400);
            text-decoration: none;
            font-size: 13px;
            transition: color var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
        }

        .footer-link:hover {
            color: var(--gray-600);
        }

        .footer-divider {
            color: var(--gray-200);
            font-size: 12px;
            user-select: none;
        }

        .gongan-link {
            cursor: pointer;
        }

        .gongan-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .gongan-badge img {
            width: 14px;
            height: 14px;
            object-fit: contain;
        }

        .footer-copyright {
            color: var(--gray-400);
            font-size: 12px;
            line-height: 1.6;
            text-align: center;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .container {
                padding: 0 24px;
            }

            header .container {
                height: 56px;
            }

            .site-title {
                font-size: 16px;
            }

            main {
                padding: 48px 0;
            }

            .footer-links {
                flex-direction: column;
                gap: 12px;
            }

            .footer-divider {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 20px;
            }

            main {
                padding: 40px 0;
            }
        }
    </style>
    {{ baidu_tongji | safe }}
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5316621182787661" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="site-title"><a href="/">yyfollower</a></div>
            <nav>
                <button class="header-tab-btn{% if active_tab == 'tools' %} active{% endif %}" data-tab="tools" onclick="switchTab('tools')">🔧 工具集</button>
                <button class="header-tab-btn{% if active_tab == 'posts' %} active{% endif %}" data-tab="posts" onclick="switchTab('posts')">📝 博客</button>
                <button class="header-tab-btn{% if active_tab == 'about' %} active{% endif %}" data-tab="about" onclick="switchTab('about')">👤 关于</button>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-inner">
                <div class="footer-links">
                    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="footer-link">浙ICP备2023004975号-2</a>
                    <span class="footer-divider">·</span>
                    <a class="footer-link gongan-link" onclick="handleToGongan();">
                        <span class="gongan-badge">
                            <img src="https://beian.mps.gov.cn/web/assets/logo01.6189a29f.png" alt="">
                            <span>浙公网安备33011002017713号</span>
                        </span>
                    </a>
                </div>
                <p class="footer-copyright">© 2023 – 2026 yyfollower. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        function handleToGongan() {
            window.open('https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=33011002017713', '_blank');
        }

        function switchTab(name) {
            // 检查当前页面是否有 tab 内容区
            var target = document.getElementById('tab-' + name);
            if (!target) {
                // 不在首页，跳转到首页并带上 tab 参数
                window.location.href = '/?tab=' + name;
                return;
            }

            // 更新 URL 参数（不刷新页面）
            var url = new URL(window.location);
            url.searchParams.set('tab', name);
            window.history.replaceState({tab: name}, '', url);

            document.querySelectorAll('.header-tab-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.querySelector('.header-tab-btn[data-tab="' + name + '"]').classList.add('active');

            document.querySelectorAll('.tab-content').forEach(function(content) {
                content.classList.remove('active');
            });
            target.classList.add('active');

            // 滚动到顶部
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 页面加载时检测 URL 中的 tab 参数
        (function() {
            var params = new URLSearchParams(window.location.search);
            var tab = params.get('tab');
            if (tab && document.getElementById('tab-' + tab)) {
                switchTab(tab);
            }
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
